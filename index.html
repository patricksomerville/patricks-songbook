<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Patrick's Songbook - Fake Book & Teleprompter</title>
    <link href="https://fonts.googleapis.com/css2?family=Permanent+Marker&family=Rock+Salt&family=Courier+Prime:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0a0a0a;
            --fg: #f0f0f0;
            --accent: #ff3333;
            --chord: #ffaa00;
            --dim: #666;
            --panel: #1a1a1a;
        }
        
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            background: var(--bg);
            color: var(--fg);
            font-family: 'Courier Prime', monospace;
            min-height: 100vh;
            overflow-x: hidden;
        }
        
        /* INDEX PAGE */
        .index-header {
            padding: 2rem;
            border-bottom: 4px solid var(--accent);
            text-align: center;
        }
        
        .index-header h1 {
            font-family: 'Permanent Marker', cursive;
            font-size: 3rem;
            color: var(--fg);
            letter-spacing: 2px;
        }
        
        .index-header p {
            color: var(--dim);
            margin-top: 0.5rem;
            font-size: 1.1rem;
        }
        
        .song-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 1rem;
            padding: 2rem;
            max-width: 1400px;
            margin: 0 auto;
        }
        
        .song-card {
            background: var(--panel);
            border: 2px solid #333;
            padding: 1.5rem;
            cursor: pointer;
            transition: all 0.2s;
            position: relative;
        }
        
        .song-card:hover {
            border-color: var(--accent);
            transform: translateY(-2px);
            box-shadow: 0 4px 20px rgba(255, 51, 51, 0.2);
        }
        
        .song-card .title {
            font-family: 'Permanent Marker', cursive;
            font-size: 1.4rem;
            color: var(--fg);
            margin-bottom: 0.5rem;
        }
        
        .song-card .meta {
            color: var(--dim);
            font-size: 0.9rem;
        }
        
        .song-card .key {
            display: inline-block;
            background: var(--accent);
            color: var(--bg);
            padding: 2px 8px;
            border-radius: 4px;
            font-weight: bold;
            font-size: 0.85rem;
            margin-top: 0.5rem;
        }
        
        /* TELEPROMPTER PAGE */
        .teleprompter {
            display: none;
            height: 100vh;
            flex-direction: column;
        }
        
        .teleprompter.active {
            display: flex;
        }
        
        .controls {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: rgba(10, 10, 10, 0.95);
            border-top: 3px solid var(--accent);
            padding: 1rem;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 1.5rem;
            z-index: 100;
            backdrop-filter: blur(10px);
        }
        
        .control-btn {
            background: var(--panel);
            border: 2px solid var(--dim);
            color: var(--fg);
            padding: 0.8rem 1.5rem;
            font-family: 'Permanent Marker', cursive;
            font-size: 1.2rem;
            cursor: pointer;
            border-radius: 8px;
            transition: all 0.2s;
        }
        
        .control-btn:hover {
            border-color: var(--accent);
            background: #222;
        }
        
        .control-btn.primary {
            border-color: var(--accent);
            background: var(--accent);
            color: var(--bg);
        }
        
        .speed-display {
            font-family: 'Permanent Marker', cursive;
            font-size: 1.5rem;
            color: var(--chord);
            min-width: 80px;
            text-align: center;
        }
        
        .scroll-container {
            flex: 1;
            overflow: hidden;
            position: relative;
            padding: 2rem;
            padding-bottom: 120px;
        }
        
        .scroll-content {
            font-family: 'Permanent Marker', cursive;
            font-size: 3rem;
            line-height: 1.8;
            color: var(--fg);
            white-space: pre-wrap;
            padding: 2rem;
            max-width: 1000px;
            margin: 0 auto;
            will-change: transform;
        }
        
        .scroll-content .chord-line {
            color: var(--chord);
            font-weight: bold;
            font-size: 0.85em;
            line-height: 1.2;
            margin-bottom: 0.1em;
            white-space: pre;
            font-family: 'Courier Prime', monospace;
        }
        
        .scroll-content .lyric-line {
            white-space: pre;
            margin-bottom: 0.8em;
            display: block;
        }
        
        .scroll-content .chord-inline {
            color: var(--chord);
            font-weight: bold;
            display: inline;
        }
        
        .scroll-content .section-label {
            color: var(--accent);
            font-size: 0.7em;
            text-transform: uppercase;
            letter-spacing: 3px;
            margin-top: 1.5em;
            display: block;
        }
        
        .scroll-content .chord {
            color: var(--chord);
            font-weight: bold;
        }
        
        .song-info {
            text-align: center;
            padding: 2rem;
            border-bottom: 2px solid var(--accent);
            margin-bottom: 2rem;
        }
        
        .song-info h2 {
            font-family: 'Permanent Marker', cursive;
            font-size: 2.5rem;
            margin-bottom: 0.5rem;
        }
        
        .song-info .subtitle {
            color: var(--dim);
            font-size: 1.2rem;
        }
        
        .back-btn {
            position: fixed;
            top: 1rem;
            left: 1rem;
            background: var(--panel);
            border: 2px solid var(--dim);
            color: var(--fg);
            padding: 0.5rem 1rem;
            font-family: 'Permanent Marker', cursive;
            font-size: 1rem;
            cursor: pointer;
            border-radius: 8px;
            z-index: 100;
        }
        
        .back-btn:hover {
            border-color: var(--accent);
        }
        
        .size-controls {
            display: flex;
            gap: 0.5rem;
            align-items: center;
        }
        
        @media (max-width: 768px) {
            .scroll-content { font-size: 2rem; }
            .index-header h1 { font-size: 2rem; }
            .controls { flex-wrap: wrap; gap: 0.5rem; }
            .control-btn { padding: 0.5rem 1rem; font-size: 1rem; }
        }
    </style>
</head>

[D] Ain't laid an egg since late last [D] spring.`
            },
            {
                title: "Cripple Creek",
                artist: "Traditional",
                key: "G",
                capo: null,
                format: "inline",
                content: `[G] Goin' up Cripple Creek, goin' in a run
[C] Goin' up Cripple Creek, goin' in a [G] run
[G] Goin' up Cripple Creek, goin' in a run
[D] Goin' up Cripple Creek, goin' in a [G] run.`
            },
            {
                title: "Old Joe Clark",
                artist: "Traditional",
                key: "A",
                capo: null,
                format: "inline",
                content: `[A] Old Joe Clark's a fine old man
[D] Tell you the reason [A] why
[A] He courted them all and he [E7] married three
[A] And still he wouldn't [D] die.`
            },
            {
                title: "Red Rocking Chair",
                artist: "Traditional",
                key: "G",
                capo: null,
                format: "inline",
                content: `[G] You ain't no good, you can't be trusted
[C] You ain't no good, you can't be [G] trusted
[G] You ain't no good, you can't be trusted
[D7] You ain't no good, you can't be [G] trusted.`
            }
        ];

        // ========================
        // RENDER INDEX
        // ========================
        function renderIndex() {
            const grid = document.getElementById('songGrid');
            grid.innerHTML = songs.map((song, i) => `
                <div class="song-card" onclick="openSong(${i})">
                    <div class="title">${song.title}</div>
                    <div class="meta">${song.artist}${song.capo ? ` | Capo: ${song.capo}` : ''}</div>
                    <span class="key">${song.key}</span>
                </div>
            `).join('');
        }

        // ========================
        // TELEPROMPTER STATE
        // ========================
        let scrollSpeed = 5;
        let isPlaying = false;
        let scrollPos = 0;
        let animationId = null;
        let currentFontSize = 3; // rem

        function openSong(index) {
            const song = songs[index];
            
            document.getElementById('index').style.display = 'none';
            document.getElementById('teleprompter').classList.add('active');
            
            // Render song info
            document.getElementById('songInfo').innerHTML = `
                <h2>${song.title}</h2>
                <div class="subtitle">${song.artist}${song.capo ? ` | Capo: ${song.capo}` : ''} | Key: ${song.key}</div>
            `;
            
            // Parse and render content
            const content = parseSongContent(song.content, song.format);
            document.getElementById('scrollContent').innerHTML = content;
            document.getElementById('scrollContent').style.fontSize = currentFontSize + 'rem';
            
            resetScroll();
            updateSpeedDisplay();
        }
        
        function parseSongContent(text, format) {
            if (format === 'riseup') {
                return parseRiseUpFormat(text);
            } else {
                return parseInlineFormat(text);
            }
        }
        
        function parseRiseUpFormat(text) {
            const lines = text.split('\n');
            let result = '';
            let chordLine = '';
            let lyricLine = '';
            let inChordBlock = false;
            
            for (let line of lines) {
                // Section labels like [CHORUS]
                if (line.trim().startsWith('[') && line.trim().endsWith(']')) {
                    if (chordLine || lyricLine) {
                        result += renderChordLyricPair(chordLine, lyricLine);
                        chordLine = '';
                        lyricLine = '';
                    }
                    result += `<span class="section-label">${escapeHtml(line.trim().slice(1, -1))}</span>\n`;
                    continue;
                }
                
                // Detect if line is mostly chords (short, uppercase, contains chord chars)
                const isChordLine = isMostlyChords(line);
                
                if (isChordLine && !inChordBlock) {
                    chordLine = line;
                    inChordBlock = true;
                } else if (isChordLine && inChordBlock) {
                    // Previous was chord, this is also chord - flush previous pair
                    result += renderChordLyricPair(chordLine, lyricLine);
                    chordLine = line;
                    lyricLine = '';
                } else if (!isChordLine && inChordBlock) {
                    lyricLine = line;
                    result += renderChordLyricPair(chordLine, lyricLine);
                    chordLine = '';
                    lyricLine = '';
                    inChordBlock = false;
                } else if (!isChordLine && !inChordBlock) {
                    // Standalone lyric line
                    result += `<span class="lyric-line">${escapeHtml(line)}</span>\n`;
                }
            }
            
            // Flush remaining
            if (chordLine || lyricLine) {
                result += renderChordLyricPair(chordLine, lyricLine);
            }
            
            return result;
        }
        
        function isMostlyChords(line) {
            const trimmed = line.trim();
            if (!trimmed) return false;
            // Chord lines are typically shorter and contain chord symbols
            const tokens = trimmed.split(/\s+/).filter(t => t);
            if (tokens.length === 0) return false;
            const chordMatches = tokens.filter(t => /^[A-G][#b]?m?(aj|dim|aug|sus|add|7|9|11|13)?[0-9]*(\/[A-G][#b]?)?$/.test(t)).length;
            return chordMatches / tokens.length > 0.5 || tokens.length < 4 && chordMatches > 0;
        }
        
        function renderChordLyricPair(chordLine, lyricLine) {
            if (!chordLine && !lyricLine) return '';
            if (!chordLine) return `<span class="lyric-line">${escapeHtml(lyricLine)}</span>\n`;
            if (!lyricLine) return `<span class="chord-line">${escapeHtml(chordLine)}</span>\n`;
            
            // For teleprompter: show chord line above lyric line, preserving spacing
            return `<span class="chord-line">${escapeHtml(chordLine)}</span>\n<span class="lyric-line">${escapeHtml(lyricLine)}</span>\n`;
        }
        
        function parseInlineFormat(text) {
            // Convert [Chord]lyrics to chord+lyric display
            const chordRegex = /\[([A-G][#b]?m?(?:aj|dim|aug|sus|add)?[0-9]*(?:\/[A-G][#b]?)?)\]/g;
            
            let result = '';
            const lines = text.split('\n');
            
            for (const line of lines) {
                if (line.trim().startsWith('[') && line.trim().endsWith(']') && !line.includes(' ')) {
                    result += `<span class="section-label">${escapeHtml(line.trim().slice(1, -1))}</span>\n`;
                    continue;
                }
                
                let processed = line;
                // Replace [Chord] with styled chord
                processed = processed.replace(chordRegex, '<span class="chord-inline">$1</span>');
                result += `<span class="lyric-line">${processed}</span>\n`;
            }
            
            return result;
        }
        
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        function showIndex() {
            stopScroll();
            document.getElementById('teleprompter').classList.remove('active');
            document.getElementById('index').style.display = 'block';
        }

        // ========================
        // SCROLLING CONTROLS
        // ========================
        function togglePlay() {
            isPlaying = !isPlaying;
            document.getElementById('playBtn').textContent = isPlaying ? 'PAUSE' : 'PLAY';
            
            if (isPlaying) {
                startScroll();
            } else {
                cancelAnimationFrame(animationId);
            }
        }
        
        function startScroll() {
            const content = document.getElementById('scrollContent');
            const container = document.getElementById('scrollContainer');
            
            function step() {
                if (!isPlaying) return;
                
                scrollPos += scrollSpeed * 0.5;
                const maxScroll = content.offsetHeight - container.offsetHeight + 200;
                
                if (scrollPos >= maxScroll) {
                    scrollPos = maxScroll;
                    isPlaying = false;
                    document.getElementById('playBtn').textContent = 'PLAY';
                } else {
                    content.style.transform = `translateY(-${scrollPos}px)`;
                    animationId = requestAnimationFrame(step);
                }
            }
            
            animationId = requestAnimationFrame(step);
        }
        
        function stopScroll() {
            isPlaying = false;
            cancelAnimationFrame(animationId);
            document.getElementById('playBtn').textContent = 'PLAY';
        }
        
        function adjustSpeed(delta) {
            scrollSpeed = Math.max(1, Math.min(20, scrollSpeed + delta));
            updateSpeedDisplay();
        }
        
        function updateSpeedDisplay() {
            document.getElementById('speedDisplay').textContent = scrollSpeed;
        }
        
        function resetScroll() {
            scrollPos = 0;
            document.getElementById('scrollContent').style.transform = 'translateY(0)';
        }
        
        function changeSize(delta) {
            currentFontSize = Math.max(1.5, Math.min(6, currentFontSize + delta));
            document.getElementById('scrollContent').style.fontSize = currentFontSize + 'rem';
        }

        // Keyboard controls
        document.addEventListener('keydown', (e) => {
            if (!document.getElementById('teleprompter').classList.contains('active')) return;
            
            if (e.code === 'Space') {
                e.preventDefault();
                togglePlay();
            } else if (e.code === 'ArrowUp') {
                scrollPos = Math.max(0, scrollPos - 50);
                document.getElementById('scrollContent').style.transform = `translateY(-${scrollPos}px)`;
            } else if (e.code === 'ArrowDown') {
                scrollPos += 50;
                document.getElementById('scrollContent').style.transform = `translateY(-${scrollPos}px)`;
            } else if (e.code === 'Escape') {
                showIndex();
            }
        });

        // Initialize
        renderIndex();
    </script>
</body>
</html>
